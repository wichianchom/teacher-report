     <h1 id="main-title" class="text-xl md:text-2xl font-bold text-gray-800 mb-1">รายงานผลการปฏิบัติงานของข้าราชการครูและบุคลากรทางการศึกษา</h1>

         <option value="">-- เลือกกลุ่มชั้น --</option> 
         <option value="อนุบาล 3">อนุบาล 3</option> 
         <option value="ป.1">ป.1</option>

         <option value="ป.3">ป.3</option>

       <div class="mb-6">
        <label class="block text-gray-700 font-medium mb-2 text-sm"> <span class="text-red-500">*</span> แนบไฟล์งาน (เลือกได้หลายไฟล์) </label> 
        <input type="file" id="workFiles" multiple required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none bg-white">

       <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> บันทึกข้อมูล

    <div id="status-section" class="max-w-4xl mx-auto hidden">
     <div class="glass-card rounded-2xl p-6 shadow-xl">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4 gap-3">
       <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">

         <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>

       <div class="flex items-center gap-2">

          🔒 แอดมิน
         </button>
         <button onclick="fetchData()" id="fetchBtn" class="px-4 py-2 bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-medium rounded-xl shadow-md hover:shadow-lg transition-all duration-300 flex items-center gap-2 text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg> รีเฟรช

       <input type="text" id="searchInput" onkeyup="filterTable()" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none" placeholder="🔍 ค้นหาชื่อ หรือกลุ่มชั้น...">

      <div class="overflow-x-auto">
       <table class="w-full" id="dataTable">

  <script>
    // URL Backend Google Sheet
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbydkOYPRqxmoBQAcElPWAApDvicazs6UmT_CwHUlTFcnMyauNsZng2b1t-fCesUitchOQ/exec';
    
    let allData = [];
    let isAdminMode = false; // ตัวแปรเช็คสถานะการเข้าสู่ระบบของแอดมิน
    const ADMIN_PASSWORD = "1234"; // -------------------- เปลี่ยนรหัสผ่านแอดมินที่นี่ --------------------

    // จัดการระบบ Admin
    async function promptAdminLogin() {
      if (isAdminMode) {
        // กรณีล็อกอินอยู่แล้วและกดซ้ำ (ออกจากระบบ)
        isAdminMode = false;
        document.getElementById('adminBtn').innerHTML = '🔒 แอดมิน';
        document.getElementById('adminBtn').classList.replace('bg-blue-100', 'bg-gray-100');
        document.getElementById('adminBtn').classList.replace('text-blue-700', 'text-gray-600');
        renderTable(allData); // โหลดตารางใหม่ (ซ่อนคอลัมน์)
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'ออกจากระบบแอดมิน', showConfirmButton: false, timer: 1500 });
        return;
      }

      // ป๊อปอัปให้ใส่รหัสผ่าน
      const { value: password } = await Swal.fire({
        title: 'เข้าสู่ระบบผู้ตรวจประเมิน',
        input: 'password',
        inputPlaceholder: 'กรอกรหัสผ่านแอดมิน...',
        inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
        showCancelButton: true,
        confirmButtonText: 'เข้าสู่ระบบ',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#3B82F6'
      });

      if (password) {
        if (password === ADMIN_PASSWORD) {
          isAdminMode = true;
          document.getElementById('adminBtn').innerHTML = '🔓 ออกจากระบบ';
          document.getElementById('adminBtn').classList.replace('bg-gray-100', 'bg-blue-100');
          document.getElementById('adminBtn').classList.replace('text-gray-600', 'text-blue-700');
          renderTable(allData); // โหลดตารางใหม่ (แสดงคอลัมน์คะแนนและลิงก์)
          Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'เข้าสู่ระบบสำเร็จ!', showConfirmButton: false, timer: 1500 });
        } else {
          Swal.fire({ icon: 'error', title: 'รหัสผ่านไม่ถูกต้อง', confirmButtonColor: '#EF4444' });
        }
      }
    }
    
    if (window.elementSdk) {
      const defaultConfig = {
        school_name: 'โรงเรียนวิเชียรชม',
        system_title: 'รายงานผลการปฏิบัติงานของข้าราชการครูและบุคลากรทางการศึกษา',
        primary_color: '#3B82F6',
        secondary_color: '#10B981',
        background_color: '#E0F2FE',
        text_color: '#1F2937'
      };
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          document.getElementById('school-name').textContent = config.school_name || defaultConfig.school_name;
          document.getElementById('main-title').textContent = config.system_title || defaultConfig.system_title;
        }
      });
    }

    // สลับแท็บ
    function switchTab(tab) {
      const submitTab = document.getElementById('tab-submit');
      const statusTab = document.getElementById('tab-status');
      const submitSection = document.getElementById('submit-section');
      const statusSection = document.getElementById('status-section');

      if (tab === 'submit') {
        submitTab.className = 'tab-active px-6 py-3 rounded-xl font-medium transition-all duration-300 flex items-center gap-2';
        statusTab.className = 'tab-inactive px-6 py-3 rounded-xl font-medium transition-all duration-300 flex items-center gap-2';
        submitSection.classList.remove('hidden');
        statusSection.classList.add('hidden');
      } else {
        submitTab.className = 'tab-inactive px-6 py-3 rounded-xl font-medium transition-all duration-300 flex items-center gap-2';
        statusTab.className = 'tab-active px-6 py-3 rounded-xl font-medium transition-all duration-300 flex items-center gap-2';
        submitSection.classList.add('hidden');
        statusSection.classList.remove('hidden');
        fetchData(); 
      }
    }

    // จัดรูปแบบวันที่
    function formatThaiDate(date) {
      const d = new Date(date);
      const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      const day = d.getDate();
      const month = thaiMonths[d.getMonth()];
      const year = d.getFullYear() + 543;
      const hours = d.getHours().toString().padStart(2, '0');
      const minutes = d.getMinutes().toString().padStart(2, '0');
      return `${day} ${month} ${year} ${hours}:${minutes} น.`;
    }

    // JSONP สำหรับโหลดข้อมูล
    let jsonpCallbackId = 0;
    function fetchViaJSONP() {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + (++jsonpCallbackId);
        const timeout = setTimeout(() => { delete window[callbackName]; reject(new Error('Request timeout')); }, 30000);
        window[callbackName] = function(response) { clearTimeout(timeout); delete window[callbackName]; resolve(response); };
        const params = new URLSearchParams();
        params.append('action', 'fetch');
        params.append('callback', callbackName);
        const script = document.createElement('script');
        script.src = SCRIPT_URL + '?' + params.toString();
        script.onerror = () => { clearTimeout(timeout); delete window[callbackName]; reject(new Error('Script load error')); };
        document.body.appendChild(script);
      });
    }

    // แปลงไฟล์เป็น Base64
    function getBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve({ name: file.name, mimeType: file.type, base64: reader.result.split(',')[1] });
        reader.onerror = error => reject(error);
      });
    }

    // ฟังก์ชันส่งข้อมูล
    async function handleSubmit(event) {
      event.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const fullName = document.getElementById('fullName').value.trim();
      const academicRank = document.getElementById('academicRank').value;
      const gradeLevel = document.getElementById('gradeLevel').value;
      const fileInput = document.getElementById('workFiles');
      const submitDate = formatThaiDate(new Date());

      if (!fullName || !academicRank || !gradeLevel || fileInput.files.length === 0) {
        Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบถ้วน', text: 'กรุณากรอกข้อมูลและแนบไฟล์อย่างน้อย 1 ไฟล์', confirmButtonColor: '#3B82F6' });
        return;
      }

      let totalSize = 0;
      for (let i = 0; i < fileInput.files.length; i++) totalSize += fileInput.files[i].size;
      
      if (totalSize > 50 * 1024 * 1024) {
        Swal.fire({ icon: 'error', title: 'ขนาดไฟล์ใหญ่เกินไป', text: 'กรุณาอัปโหลดไฟล์ขนาดรวมกันไม่เกิน 50 MB ครับ', confirmButtonColor: '#EF4444' });
        return; 
      }

      submitBtn.disabled = true;
      Swal.fire({ title: 'กำลังอัปโหลดไฟล์และบันทึกข้อมูล...', text: 'โปรดรอสักครู่ ห้ามปิดหน้าจอนี้', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

      try {
        const filesData = [];
        for (let i = 0; i < fileInput.files.length; i++) filesData.push(await getBase64(fileInput.files[i]));

        const payload = { fullName, academicRank, gradeLevel, submitDate, files: filesData };
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();

        if (result.status === 'success') {
          Swal.fire({
            icon: 'success',
            title: 'ส่งงานสำเร็จ!',
            html: `<div class="text-left text-sm mt-2"><p><strong>ชื่อ:</strong> ${fullName}</p><p><strong>วิทยฐานะ:</strong> ${academicRank}</p><p><strong>จำนวนไฟล์:</strong> ${fileInput.files.length} ไฟล์</p><p class="text-green-600 mt-2">ระบบได้จัดเก็บไฟล์ลงในโฟลเดอร์เรียบร้อยแล้ว</p></div>`,
            confirmButtonColor: '#10B981'
          });
          document.getElementById('submitForm').reset();
        } else throw new Error(result.message || 'Unknown error');
      } catch (error) {
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: `สาเหตุ: ${error.message || 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้'}`, confirmButtonColor: '#EF4444' });
      } finally {
        submitBtn.disabled = false;
      }
    }

    // ดึงข้อมูล
    async function fetchData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = `<tr><td colspan="8" class="px-4 py-12 text-center text-gray-500"><div class="flex flex-col items-center"><svg class="animate-spin h-8 w-8 text-green-500 mb-3" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p>กำลังดึงข้อมูลล่าสุด...</p></div></td></tr>`;
      try {
        const response = await fetchViaJSONP();
        if (response && response.status === 'success') {
          allData = response.data || [];
          renderTable(allData);
          Swal.fire({ toast: true, position: "top-end", showConfirmButton: false, timer: 2000, icon: "success", title: `อัปเดตข้อมูลล่าสุดแล้ว` });
        } else throw new Error(response?.message || 'Failed');
      } catch (error) {
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถโหลดข้อมูลตารางได้', confirmButtonColor: '#EF4444' });
        renderTable([]); 
      }
    }

    // วาดตาราง (แยกมุมมองผู้ใช้ทั่วไป และ แอดมิน)
    function renderTable(data) {
      const thead = document.getElementById('tableHead');
      const tbody = document.getElementById('tableBody');
      
      // ส่วนหัวตารางแปรผันตามสถานะ Admin
      thead.innerHTML = `
        <tr class="bg-gray-50">
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider rounded-tl-lg">ลำดับ</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">ชื่อ-นามสกุล</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">วิทยฐานะ</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">กลุ่มชั้น</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">วันที่ส่ง</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider ${!isAdminMode ? 'rounded-tr-lg' : ''}">สถานะ</th>
          ${isAdminMode ? '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">คะแนน</th>' : ''}
          ${isAdminMode ? '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider rounded-tr-lg">ลิงก์งาน</th>' : ''}
        </tr>
      `;

      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${isAdminMode ? 8 : 6}" class="px-4 py-12 text-center text-gray-500"><p>ไม่พบข้อมูลการส่งงาน</p></td></tr>`;
        return;
      }

      tbody.innerHTML = data.map((item, index) => {
        let statusClass = 'status-pending';
        let statusText = 'รอตรวจ';
        if (item.status === 'ตรวจแล้ว') { statusClass = 'status-checked'; statusText = 'ตรวจแล้ว'; } 
        else if (item.status === 'ส่งใหม่') { statusClass = 'status-resubmit'; statusText = 'ส่งใหม่'; }

        // คอลัมน์คะแนนและลิงก์ จะแสดงเมื่อเป็น Admin เท่านั้น
        let adminColumns = '';
        if (isAdminMode) {
          adminColumns = `
            <td class="px-4 py-3 text-sm text-gray-600 font-medium">${item.score || '-'}</td>
            <td class="px-4 py-3">${item.workLink ? `<a href="${item.workLink}" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:text-blue-700 underline text-sm">ดูงาน</a>` : '-'}</td>
          `;
        }

        return `
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-4 py-3 text-sm text-gray-600">${index + 1}</td>
            <td class="px-4 py-3 text-sm font-medium text-gray-800">${item.fullName || '-'}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${item.academicRank || '-'}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${item.gradeLevel || '-'}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${item.submitDate || '-'}</td>
            <td class="px-4 py-3"><span class="status-badge ${statusClass}">${statusText}</span></td>
            ${adminColumns}
          </tr>
        `;
      }).join('');
    }

    // ค้นหาในตาราง
    function filterTable() {
      const searchValue = document.getElementById('searchInput').value.toLowerCase();
      const filteredData = allData.filter(item => 
        (item.fullName && item.fullName.toLowerCase().includes(searchValue)) ||
        (item.gradeLevel && item.gradeLevel.toLowerCase().includes(searchValue)) ||
        (item.academicRank && item.academicRank.toLowerCase().includes(searchValue))
      );
      renderTable(filteredData);
    }
  </script>
 </body>
